<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P МЕГА-Комнаты (Эксперимент до 15 человек)</title>
    <script src="peerjs.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
        }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background-color: #1e1e2e; 
            color: #cdd6f4; 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        #sidebar { 
            width: 300px; 
            background-color: #252538; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            border-right: 2px solid #313244; 
            flex-shrink: 0; 
            overflow-y: auto; 
        }
        #main-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #181825; 
            height: 100%; 
        }
        #chat-window { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        #input-area { 
            padding: 15px; 
            background-color: #313244; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
        .msg { 
            padding: 10px 14px; 
            border-radius: 8px; 
            max-width: 75%; 
            word-break: break-word; 
            font-size: 0.95em; 
        }
        .msg.me { 
            background-color: #89b4fa; 
            color: #11111b; 
            align-self: flex-end; 
        }
        .msg.friend { 
            background-color: #45475a; 
            color: #cdd6f4; 
            align-self: flex-start; 
        }
        .room-box { 
            font-size: 1.1em; 
            background: #11111b; 
            padding: 12px; 
            border-radius: 6px; 
            text-align: center; 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: #f9e2af; 
            border: 1px solid #313244; 
        }
        input[type="text"] { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            background-color: #45475a; 
            color: #fff; 
            font-size: 1em; 
            width: 100%; 
            margin-bottom: 10px; 
        }
        button { 
            background-color: #a6e3a1; 
            color: #11111b; 
            border: none; 
            padding: 12px 15px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.95em; 
            width: 100%; 
            margin-bottom: 8px; 
        }
        button:disabled { 
            background-color: #585b70; 
            color: #7f849c; 
            cursor: not-allowed; 
        }
        .volume-control { 
            margin: 15px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            background: #181825; 
            padding: 10px; 
            border-radius: 6px; 
        }
        .volume-control label { 
            font-size: 0.85em; 
            color: #a6adc8; 
            display: flex; 
            justify-content: space-between; 
        }
        .volume-control input[type="range"] { 
            width: 100%; 
            accent-color: #a6e3a1; 
            cursor: pointer; 
        }
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #11111b; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
        }
        .login-card { 
            background: #252538; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #313244; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
        }
        .exp-btn { 
            background-color: #f38ba8; 
            color: #11111b; 
        }
        #audio-containers { 
            display: none; 
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="margin-top: 0; color: #89b4fa;">P2P Лобби</h2>
        <p style="color: #a6adc8; font-size: 0.9em; margin-bottom: 20px;">Введите название комнаты</p>
        <input type="text" id="room-input" placeholder="Название комнаты..." style="text-align: center;">
        
        <button id="create-room-btn">Создать обычную (на двоих)</button>
        <button id="create-mega-btn" class="exp-btn">🔥 Создать МЕГА-руму (до 15 чел)</button>
        <button id="join-room-btn" style="background-color: #89b4fa;">Войти в комнату</button>
    </div>
</div>

<div id="sidebar">
    <h3 style="margin: 0 0 5px 0; font-size: 0.9em; color: #a6adc8;">Комната:</h3>
    <div class="room-box" id="room-display">---</div>
    
    <div id="status" style="color: #a6e3a1; font-weight: bold; margin-bottom: 12px; font-size: 0.9em; word-break: break-all;">Ожидание...</div>
    <div id="peers-count" style="font-size: 0.85em; color: #bac2de; margin-bottom: 10px;">Подключено игроков: 0</div>

    <div class="volume-control">
        <label>Твой микрофон: <span id="my-vol-txt">100%</span></label>
        <input type="range" id="my-volume" min="0" max="300" value="100">
    </div>
</div>

<div id="main-area">
    <div id="chat-window">
        <div class="msg friend" style="align-self: center; background: none; color: #6c7086; text-align: center;">
            Чат готов к работе.
        </div>
    </div>
    
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Введите сообщение..." disabled style="margin-bottom:0;">
        <button id="send-btn" disabled style="width: auto; margin-bottom:0;">Отправить</button>
    </div>
</div>

<div id="audio-containers"></div>

<script>
    async function hashRoomName(name, prefix) {
        const clean = name.trim().toLowerCase();
        const msgBuffer = new TextEncoder().encode(clean);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);
        return `rm_${prefix}_${hashHex}`;
    }

    const peerConfig = {
        config: { 
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' }, 
                { 'urls': 'stun:stun1.l.google.com:19302' }
            ] 
        }
    };

    let peer = null;
    let localAudioStream = null;
    let audioContext = null;
    let gainNode = null;
    let connections = []; 
    let isMegaRoom = false;

    const loginOverlay = document.getElementById('login-overlay');
    const roomInput = document.getElementById('room-input');
    const createRoomBtn = document.getElementById('create-room-btn');
    const createMegaBtn = document.getElementById('create-mega-btn');
    const joinRoomBtn = document.getElementById('join-room-btn');
    const roomDisplay = document.getElementById('room-display');
    const statusDisplay = document.getElementById('status');
    const peersCount = document.getElementById('peers-count');
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const audioContainers = document.getElementById('audio-containers');
    const myVolSlider = document.getElementById('my-volume');
    const myVolTxt = document.getElementById('my-vol-txt');

    createRoomBtn.addEventListener('click', () => startSession("host", false));
    createMegaBtn.addEventListener('click', () => startSession("host", true));
    joinRoomBtn.addEventListener('click', () => startSession("guest", false));

    async function startSession(type, megaMode) {
        const rName = roomInput.value.trim();
        if (!rName) return alert("Введите имя комнаты!");
        
        isMegaRoom = megaMode;
        loginOverlay.style.display = 'none';
        roomDisplay.innerText = rName + (isMegaRoom ? " (MEGA)" : "");
        statusDisplay.innerText = "Запуск сессии...";

        const randomId = Math.random().toString(36).substring(2, 6);
        let myPeerId = "";
        
        if (type === "host") {
            myPeerId = await hashRoomName(rName, "host");
            statusDisplay.innerText = "Создано лобби. Ожидание игроков...";
        } else {
            myPeerId = (await hashRoomName(rName, "guest")) + "_" + randomId;
            statusDisplay.innerText = "Подключение к лобби...";
        }

        initPeer(myPeerId, type === "host", rName);
    }

    function initPeer(myId, isHost, originalRoomName) {
        peer = new Peer(myId, peerConfig);

        peer.on('open', async () => {
            await requestMicrophone();
            
            if (!isHost) {
                const targetHostId = await hashRoomName(originalRoomName, "host");
                const conn = peer.connect(targetHostId);
                setupDataConnection(conn);
                
                if (localAudioStream) {
                    peer.call(targetHostId, localAudioStream);
                }
            }
        });

        peer.on('connection', (conn) => {
            setupDataConnection(conn);
            if (isHost && isMegaRoom) {
                broadcast({ type: 'text', text: `Система: Новый игрок подключился к лобби.` });
            }
        });

        peer.on('call', (call) => {
            call.answer(localAudioStream);
            
            const audioElem = document.createElement('audio');
            audioElem.autoplay = true;
            audioElem.playsinline = true;
            audioContainers.appendChild(audioElem);
            
            call.on('stream', (remoteStream) => {
                audioElem.srcObject = remoteStream;
            });
        });

        peer.on('error', (err) => {
            console.error(err);
            statusDisplay.innerText = "Ошибка: " + err.type;
        });
    }

    async function requestMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localAudioStream = stream;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            gainNode = audioContext.createGain();
            source.connect(gainNode);
            const destination = audioContext.createMediaStreamDestination();
            gainNode.connect(destination);
            localAudioStream = destination.stream;
            statusDisplay.innerText = "В сети. Готов к общению.";
        } catch (err) {
            statusDisplay.innerText = "Микрофон недоступен.";
        }
    }

    function setupDataConnection(conn) {
        connections.push(conn);
        msgInput.disabled = false;
        sendBtn.disabled = false;
        
        peersCount.innerText = "Подключено игроков: " + connections.length;
        statusDisplay.innerText = "Активное лобби";

        conn.on('data', (data) => {
            if (data.type === 'text') {
                appendMessage(data.text, 'friend');
                if (isMegaRoom && peer.id.includes("_host_")) {
                    connections.forEach(c => {
                        if (c.peer !== conn.peer) c.send(data);
                    });
                }
            }
        });

        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            peersCount.innerText = "Подключено игроков: " + connections.length;
            if (connections.length === 0) statusDisplay.innerText = "Все отключились.";
        });
    }

    function broadcast(data) {
        connections.forEach(c => {
            if (c.open) c.send(data);
        });
    }

    function sendMsg() {
        const text = msgInput.value.trim();
        if (!text) return;
        
        const payload = { type: 'text', text: text };
        
        if (isMegaRoom) {
            broadcast(payload);
        } else if (connections[0]) {
            connections[0].send(payload);
        }
        
        appendMessage(text, 'me');
        msgInput.value = '';
    }

    sendBtn.addEventListener('click', sendMsg);
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });

    myVolSlider.addEventListener('input', (e) => {
        const val = e.target.value;
        myVolTxt.innerText = val + '%';
        if (gainNode) gainNode.gain.value = val / 100;
    });

    function appendMessage(text, type) {
        const msg = document.createElement('div');
        msg.classList.add('msg', type);
        msg.innerText = text;
        chatWindow.appendChild(msg);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
