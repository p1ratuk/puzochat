<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P2P Мега-Комнаты</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1e1e2e; color: #cdd6f4;
            display: flex; height: 100dvh; overflow: hidden;
        }
        #sidebar {
            width: 280px; background: #252538; padding: 20px;
            display: flex; flex-direction: column;
            border-right: 2px solid #313244; flex-shrink: 0; gap: 15px;
        }
        #main-area {
            flex: 1; display: flex; flex-direction: column;
            background: #181825; height: 100%;
        }
        #chat-window {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
        }
        #input-area {
            padding: 15px; background: #313244; display: flex; gap: 10px;
        }
        .msg {
            padding: 10px 14px; border-radius: 12px; max-width: 75%;
            word-break: break-word; font-size: 0.95em; line-height: 1.4;
        }
        .msg.me { background: #89b4fa; color: #11111b; align-self: flex-end; }
        .msg.friend { background: #45475a; align-self: flex-start; }
        .msg.system {
            align-self: center; background: none; color: #6c7086;
            font-size: 0.8em; text-align: center;
        }
        .room-box {
            font-size: 1.1em; background: #11111b; padding: 12px;
            border-radius: 8px; text-align: center; font-weight: bold;
            color: #f9e2af; border: 1px solid #313244; word-break: break-all;
        }
        input[type="text"] {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            background: #45475a; color: #fff; font-size: 1em; outline: none;
        }
        button {
            background: #a6e3a1; color: #11111b; border: none;
            padding: 10px 16px; font-weight: bold; border-radius: 8px;
            cursor: pointer; font-size: 0.9em; white-space: nowrap;
            transition: 0.2s;
        }
        button:disabled { background: #585b70; color: #7f849c; cursor: not-allowed; }
        button:hover:not(:disabled) { filter: brightness(1.1); }
        .volume-control {
            display: flex; flex-direction: column; gap: 6px;
            background: #181825; padding: 12px; border-radius: 8px;
            font-size: 0.85em;
        }
        input[type="range"] { width: 100%; accent-color: #a6e3a1; }
        #login-overlay {
            position: fixed; inset: 0; background: #11111b;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .login-card {
            background: #252538; padding: 30px; border-radius: 16px;
            border: 1px solid #313244; width: 90%; max-width: 380px;
            display: flex; flex-direction: column; gap: 12px; text-align: center;
        }
        .btn-mega { background: #f38ba8; }
        .btn-join { background: #89b4fa; }
        #peers-list { font-size: 0.8em; color: #bac2de; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color: #89b4fa;">🔊 P2P Лобби</h2>
        <p style="color: #a6adc8; font-size: 0.9em;">Введите название комнаты</p>
        <input type="text" id="room-input" placeholder="Секретное слово..." style="text-align: center;">
        <button id="create-room-btn">➕ Создать комнату (1 на 1)</button>
        <button id="create-mega-btn" class="btn-mega">🔥 Создать МЕГА-комнату</button>
        <button id="join-room-btn" class="btn-join">🚪 Войти в комнату</button>
        <p style="font-size:0.7em;color:#585b70;">Микрофон включится после входа</p>
    </div>
</div>

<div id="sidebar">
    <h3 style="font-size:0.9em;color:#a6adc8;">🏠 Комната:</h3>
    <div class="room-box" id="room-display">---</div>
    <div id="status" style="color:#a6e3a1;font-weight:bold;font-size:0.9em;">Ожидание...</div>
    <div id="peers-count" style="font-size:0.85em;">👥 Участников: 0</div>
    <div id="peers-list"></div>
    <div class="volume-control">
        <span>🎤 Мой микрофон: <strong id="my-vol-txt">100%</strong></span>
        <input type="range" id="my-volume" min="0" max="200" value="100">
    </div>
    <button id="leave-btn" style="background:#eba0ac;margin-top:auto;">🚪 Покинуть комнату</button>
</div>

<div id="main-area">
    <div id="chat-window">
        <div class="msg system">Добро пожаловать! Если нет звука — коснитесь экрана.</div>
    </div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Сообщение..." disabled>
        <button id="send-btn" disabled>📨</button>
    </div>
</div>

<div id="audio-containers" style="display:none;"></div>

<script>
    (async () => {
        // ----- Хеширование имени комнаты -----
        async function hashRoom(name, prefix) {
            const clean = name.trim().toLowerCase();
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(clean));
            const hashHex = Array.from(new Uint8Array(buf))
                .map(b => b.toString(16).padStart(2,'0')).join('').substring(0,16);
            return `rm_${prefix}_${hashHex}`;
        }

        // ----- DOM-элементы -----
        const loginOverlay = document.getElementById('login-overlay');
        const roomInput = document.getElementById('room-input');
        const roomDisplay = document.getElementById('room-display');
        const statusDiv = document.getElementById('status');
        const peersCount = document.getElementById('peers-count');
        const peersList = document.getElementById('peers-list');
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const audioContainers = document.getElementById('audio-containers');
        const myVolSlider = document.getElementById('my-volume');
        const myVolTxt = document.getElementById('my-vol-txt');
        const leaveBtn = document.getElementById('leave-btn');

        // ----- Состояние -----
        let peer = null;
        let localStream = null;
        let audioCtx = null;
        let gainNode = null;
        let dataConns = [];        // data connections
        let mediaCalls = [];       // media calls (только входящие/исходящие)
        let isMega = false;
        let amHost = false;
        let myId = '';
        let roomBaseName = '';

        // ----- Аудио-контекст (разблокировка) -----
        function ensureAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        document.addEventListener('click', ensureAudioContext, { once: true });
        document.addEventListener('touchstart', ensureAudioContext, { once: true });

        // ----- Микрофон -----
        async function getMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                ensureAudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                gainNode = audioCtx.createGain();
                source.connect(gainNode);
                const dest = audioCtx.createMediaStreamDestination();
                gainNode.connect(dest);
                localStream = dest.stream;
                statusDiv.innerText = '🎤 Микрофон активен';
                return true;
            } catch (e) {
                console.warn('Микрофон не доступен:', e);
                statusDiv.innerText = '⚠️ Без микрофона';
                return false;
            }
        }

        // ----- Обновление списка участников -----
        function updatePeersUI() {
            peersCount.innerText = `👥 Участников: ${dataConns.length + 1}`;
            let html = '';
            dataConns.forEach((conn, i) => {
                html += `<div>🔹 ${conn.peer.substring(0, 12)}...</div>`;
            });
            peersList.innerHTML = html;
            msgInput.disabled = dataConns.length === 0;
            sendBtn.disabled = dataConns.length === 0;
        }

        // ----- Добавление сообщения в чат -----
        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // ----- Отправка сообщения -----
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            const payload = { type: 'text', text, from: myId };
            dataConns.forEach(c => { if (c.open) c.send(payload); });
            addMsg(text, 'me');
            msgInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        // ----- Обработка data-соединения -----
        function setupDataConn(conn) {
            dataConns.push(conn);
            updatePeersUI();
            addMsg(`🔗 Подключился новый участник`, 'system');

            conn.on('data', data => {
                if (data.type === 'text') {
                    addMsg(data.text, 'friend');
                    // Пересылаем остальным (только если хост в мега-комнате)
                    if (amHost && isMega) {
                        dataConns.forEach(c => {
                            if (c !== conn && c.open) c.send(data);
                        });
                    }
                }
            });

            conn.on('close', () => {
                dataConns = dataConns.filter(c => c !== conn);
                updatePeersUI();
                addMsg(`🔌 Участник отключился`, 'system');
            });

            conn.on('error', err => console.error('Data error:', err));
        }

        // ----- Обработка медиа-звонка -----
        function setupMediaCall(call) {
            mediaCalls.push(call);
            const audio = document.createElement('audio');
            audio.autoplay = true;
            audio.playsinline = true;
            audio.controls = false;
            audioContainers.appendChild(audio);

            call.on('stream', remoteStream => {
                audio.srcObject = remoteStream;
                audio.play().catch(() => {});
            });

            call.on('close', () => {
                mediaCalls = mediaCalls.filter(c => c !== call);
                audio.remove();
            });

            call.on('error', err => console.error('Media error:', err));
        }

        // ----- Трансляция своего потока всем (для мега-комнат) -----
        function broadcastMediaToAll() {
            if (!localStream) return;
            dataConns.forEach(conn => {
                // Проверяем, нет ли уже звонка с этим пиром
                const exists = mediaCalls.some(c => c.peer === conn.peer);
                if (!exists) {
                    const call = peer.call(conn.peer, localStream);
                    setupMediaCall(call);
                }
            });
        }

        // ----- Инициализация PeerJS -----
        function initPeer(myPeerId, hostPeerId = null) {
            if (peer) peer.destroy();

            peer = new Peer(myPeerId, {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', async id => {
                myId = id;
                statusDiv.innerText = '🟢 В сети. ' + (amHost ? 'Ждём гостей...' : 'Подключаемся...');
                await getMic();

                if (!amHost && hostPeerId) {
                    // Гость: подключаемся к хосту
                    const conn = peer.connect(hostPeerId);
                    setupDataConn(conn);
                    if (localStream) {
                        const call = peer.call(hostPeerId, localStream);
                        setupMediaCall(call);
                    }
                }
            });

            peer.on('connection', conn => {
                setupDataConn(conn);
                // Хост: если есть микрофон, звоним новому гостю
                if (amHost && localStream) {
                    setTimeout(() => {
                        const exists = mediaCalls.some(c => c.peer === conn.peer);
                        if (!exists) {
                            const call = peer.call(conn.peer, localStream);
                            setupMediaCall(call);
                        }
                    }, 500);
                }
            });

            peer.on('call', call => {
                if (localStream) call.answer(localStream);
                else call.answer(); // отвечаем без потока
                setupMediaCall(call);
            });

            peer.on('error', err => {
                console.error('Peer error:', err);
                statusDiv.innerText = '❌ Ошибка: ' + err.type;
                if (err.type === 'peer-unavailable') {
                    addMsg('⚠️ Хост не найден. Проверьте название комнаты.', 'system');
                }
            });

            peer.on('disconnected', () => {
                statusDiv.innerText = '🔴 Отключён. Переподключение...';
                setTimeout(() => peer.reconnect(), 2000);
            });
        }

        // ----- Старт сессии -----
        async function startSession(role, mega) {
            const name = roomInput.value.trim();
            if (!name) return alert('Введите название комнаты!');
            roomBaseName = name;
            isMega = mega;
            amHost = (role === 'host');
            loginOverlay.style.display = 'none';
            roomDisplay.innerText = name + (isMega ? ' 🔥MEGA' : '');
            statusDiv.innerText = '⏳ Подготовка...';
            addMsg(`Комната: ${name}`, 'system');

            if (amHost) {
                const hostId = await hashRoom(name, 'host');
                initPeer(hostId);
            } else {
                const hostId = await hashRoom(name, 'host');
                const guestId = (await hashRoom(name, 'guest')) + '_' + Math.random().toString(36).substring(2,6);
                initPeer(guestId, hostId);
            }
        }

        // ----- Выход -----
        function leaveRoom() {
            mediaCalls.forEach(c => c.close());
            dataConns.forEach(c => c.close());
            if (peer) peer.destroy();
            peer = null; localStream = null;
            dataConns = []; mediaCalls = [];
            audioContainers.innerHTML = '';
            chatWindow.innerHTML = '<div class="msg system">Вы вышли из комнаты.</div>';
            updatePeersUI();
            loginOverlay.style.display = 'flex';
            roomDisplay.innerText = '---';
            statusDiv.innerText = 'Ожидание...';
        }

        leaveBtn.addEventListener('click', leaveRoom);

        // ----- Регулировка громкости -----
        myVolSlider.addEventListener('input', () => {
            const val = myVolSlider.value;
            myVolTxt.innerText = val + '%';
            if (gainNode) gainNode.gain.value = val / 100;
        });

        // ----- Кнопки логина -----
        document.getElementById('create-room-btn').onclick = () => startSession('host', false);
        document.getElementById('create-mega-btn').onclick = () => startSession('host', true);
        document.getElementById('join-room-btn').onclick = () => startSession('guest', false);

        // ----- Enter в поле комнаты -----
        roomInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') startSession('guest', false);
        });

    })();
</script>
</body>
</html>
