<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P2P Мега-Комнаты</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background-color: #1e1e2e; 
            color: #cdd6f4; 
            display: flex; 
            height: 100dvh; 
            margin: 0; 
            overflow: hidden; 
        }
        #sidebar { 
            width: 300px; 
            background-color: #252538; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            border-right: 2px solid #313244; 
            flex-shrink: 0; 
            overflow-y: auto; 
            gap: 12px;
        }
        #main-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #181825; 
            height: 100%; 
        }
        #chat-window { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        #input-area { 
            padding: 15px; 
            background-color: #313244; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
        .msg { 
            padding: 10px 14px; 
            border-radius: 8px; 
            max-width: 75%; 
            word-break: break-word; 
            font-size: 0.95em; 
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .msg.me { 
            background-color: #89b4fa; 
            color: #11111b; 
            align-self: flex-end; 
            flex-direction: row-reverse;
        }
        .msg.friend { 
            background-color: #45475a; 
            color: #cdd6f4; 
            align-self: flex-start; 
        }
        .msg.system {
            align-self: center;
            background: none;
            color: #6c7086;
            text-align: center;
            font-size: 0.8em;
            justify-content: center;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #585b70;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }
        .msg.me .avatar {
            background: #1e66f5;
        }
        .msg-content {
            flex: 1;
            min-width: 0;
        }
        .msg-time {
            font-size: 0.7em;
            opacity: 0.6;
            margin-top: 2px;
        }
        .room-box { 
            font-size: 1.1em; 
            background: #11111b; 
            padding: 12px; 
            border-radius: 6px; 
            text-align: center; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #f9e2af; 
            border: 1px solid #313244; 
            word-break: break-all;
        }
        input[type="text"] { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            background-color: #45475a; 
            color: #fff; 
            font-size: 1em; 
            outline: none;
        }
        button { 
            background-color: #a6e3a1; 
            color: #11111b; 
            border: none; 
            padding: 12px 15px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.95em; 
            transition: 0.2s;
            white-space: nowrap;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled { 
            background-color: #585b70; 
            color: #7f849c; 
            cursor: not-allowed; 
            transform: none;
        }
        .volume-control { 
            margin: 10px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            background: #181825; 
            padding: 12px; 
            border-radius: 6px; 
        }
        .volume-control label { 
            font-size: 0.85em; 
            color: #a6adc8; 
            display: flex; 
            justify-content: space-between; 
        }
        .volume-control input[type="range"] { 
            width: 100%; 
            accent-color: #a6e3a1; 
            cursor: pointer; 
        }
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #11111b; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
        }
        .login-card { 
            background: #252538; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #313244; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .login-card h2 {
            color: #89b4fa;
            margin-bottom: 5px;
        }
        .btn-mega { 
            background-color: #f38ba8; 
        }
        .btn-join {
            background-color: #89b4fa;
        }
        .btn-leave {
            background-color: #eba0ac;
            margin-top: auto;
        }
        .btn-refresh {
            background-color: #fab387;
            font-size: 0.8em;
            padding: 8px 12px;
        }
        #audio-containers { 
            display: none; 
        }
        .peers-box {
            background: #11111b;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85em;
        }
        .peer-item {
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .peer-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a6e3a1;
            flex-shrink: 0;
        }
        .debug-info {
            font-size: 0.7em;
            color: #585b70;
            word-break: break-all;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>🎙️ P2P Лобби</h2>
        <p style="color: #a6adc8; font-size: 0.9em;">Введите название комнаты</p>
        <input type="text" id="room-input" placeholder="Название комнаты..." style="text-align: center;">
        
        <button id="create-room-btn">Создать комнату (1 на 1)</button>
        <button id="create-mega-btn" class="btn-mega">🔥 Создать МЕГА-комнату</button>
        <button id="join-room-btn" class="btn-join">🚪 Войти в комнату</button>
        
        <p style="font-size:0.7em;color:#585b70;margin-top:8px;">
            💡 Совет: создавайте комнату на ПК, заходите с телефона
        </p>
    </div>
</div>

<div id="sidebar">
    <h3 style="margin: 0; font-size: 0.9em; color: #a6adc8;">🏠 Комната:</h3>
    <div class="room-box" id="room-display">---</div>
    
    <div id="status" style="color: #a6e3a1; font-weight: bold; font-size: 0.9em; word-break: break-all;">
        Ожидание...
    </div>
    
    <div class="peers-box">
        <div id="peers-count" style="font-weight: bold; margin-bottom: 6px;">👥 Участников: 1</div>
        <div id="peers-list"></div>
    </div>

    <div class="volume-control">
        <label>🎤 Мой микрофон: <span id="my-vol-txt">100%</span></label>
        <input type="range" id="my-volume" min="0" max="200" value="100">
    </div>

    <button id="refresh-audio-btn" class="btn-refresh">🔄 Переподключить звук</button>
    <button id="leave-btn" class="btn-leave">🚪 Покинуть комнату</button>
    
    <div class="debug-info" id="debug-info"></div>
</div>

<div id="main-area">
    <div id="chat-window">
        <div class="msg system">
            <span>💬 Чат готов. Если нет звука — нажмите "Переподключить звук"</span>
        </div>
    </div>
    
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Введите сообщение или ссылку на демку..." disabled>
        <button id="send-btn" disabled>📨 Отправить</button>
    </div>
</div>

<div id="audio-containers"></div>

<script>
    // ============ Утилиты ============
    const avatars = [
        '🐱', '🐶', '🦊', '🐸', '🐵', '🐼', '🐨', '🐯',
        '🦁', '🐮', '🐷', '🐰', '🐻', '🐔', '🐧', '🦄'
    ];
    
    function getAvatar(seed) {
        let hash = 0;
        for (let i = 0; i < seed.length; i++) {
            hash = ((hash << 5) - hash) + seed.charCodeAt(i);
            hash |= 0;
        }
        return avatars[Math.abs(hash) % avatars.length];
    }

    function getTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2,'0') + ':' + 
               now.getMinutes().toString().padStart(2,'0');
    }

    async function hashRoomName(name, prefix) {
        const clean = name.trim().toLowerCase();
        const msgBuffer = new TextEncoder().encode(clean);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);
        return `rm_${prefix}_${hashHex}`;
    }

    // ============ DOM элементы ============
    const loginOverlay = document.getElementById('login-overlay');
    const roomInput = document.getElementById('room-input');
    const createRoomBtn = document.getElementById('create-room-btn');
    const createMegaBtn = document.getElementById('create-mega-btn');
    const joinRoomBtn = document.getElementById('join-room-btn');
    const roomDisplay = document.getElementById('room-display');
    const statusDisplay = document.getElementById('status');
    const peersCount = document.getElementById('peers-count');
    const peersList = document.getElementById('peers-list');
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const audioContainers = document.getElementById('audio-containers');
    const myVolSlider = document.getElementById('my-volume');
    const myVolTxt = document.getElementById('my-vol-txt');
    const leaveBtn = document.getElementById('leave-btn');
    const refreshAudioBtn = document.getElementById('refresh-audio-btn');
    const debugInfo = document.getElementById('debug-info');

    // ============ Состояние ============
    let peer = null;
    let localAudioStream = null;
    let audioContext = null;
    let gainNode = null;
    let dataConnections = [];
    let mediaCalls = [];
    let isMegaRoom = false;
    let amIHost = false;
    let myPeerId = '';
    let myAvatar = '';
    let hostPeerId = null; // ID хоста (нужен гостю для переподключения)

    // ============ Аудио контекст ============
    function ensureAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }

    // Разблокировка звука по первому взаимодействию
    document.addEventListener('click', ensureAudio);
    document.addEventListener('touchstart', ensureAudio);

    // ============ Микрофон ============
    async function getMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }, 
                video: false 
            });
            
            ensureAudio();
            const source = audioContext.createMediaStreamSource(stream);
            gainNode = audioContext.createGain();
            source.connect(gainNode);
            
            const destination = audioContext.createMediaStreamDestination();
            gainNode.connect(destination);
            
            localAudioStream = destination.stream;
            statusDisplay.innerText = '🎤 Микрофон готов';
            debug('Микрофон получен');
            return true;
        } catch (err) {
            console.warn('Микрофон не доступен:', err);
            statusDisplay.innerText = '⚠️ Без микрофона';
            debug('Ошибка микрофона: ' + err.message);
            return false;
        }
    }

    function debug(msg) {
        console.log('[DEBUG]', msg);
        debugInfo.innerText = msg;
    }

    // ============ Интерфейс ============
    function updatePeersUI() {
        const count = dataConnections.length + 1;
        peersCount.innerText = `👥 Участников: ${count}`;
        
        let html = `<div class="peer-item"><span class="peer-dot"></span> Вы ${myAvatar}</div>`;
        dataConnections.forEach(conn => {
            const peerShort = conn.peer.substring(0, 8);
            const ava = getAvatar(conn.peer);
            const hasAudio = mediaCalls.some(c => c.peer === conn.peer);
            const audioIcon = hasAudio ? '🔊' : '🔇';
            html += `<div class="peer-item"><span class="peer-dot"></span> ${peerShort}... ${ava} ${audioIcon}</div>`;
        });
        peersList.innerHTML = html;
        
        const hasPeers = dataConnections.length > 0;
        msgInput.disabled = !hasPeers;
        sendBtn.disabled = !hasPeers;
    }

    function addMessage(text, type, peerId = '') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        
        if (type === 'system') {
            msgDiv.innerHTML = `<span>${text}</span>`;
        } else {
            const ava = type === 'me' ? myAvatar : getAvatar(peerId);
            const time = getTime();
            
            msgDiv.innerHTML = `
                <div class="avatar">${ava}</div>
                <div class="msg-content">
                    <div>${escapeHtml(text)}</div>
                    <div class="msg-time">${time}</div>
                </div>
            `;
        }
        
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ============ Отправка сообщений ============
    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || dataConnections.length === 0) return;
        
        const payload = { 
            type: 'text', 
            text: text,
            from: myPeerId,
            time: getTime()
        };
        
        dataConnections.forEach(conn => {
            if (conn.open) {
                conn.send(payload);
            }
        });
        
        addMessage(text, 'me');
        msgInput.value = '';
    }

    sendBtn.onclick = sendMessage;
    msgInput.onkeypress = (e) => {
        if (e.key === 'Enter') sendMessage();
    };

    // ============ Data Connection ============
    function setupDataConnection(conn) {
        if (dataConnections.find(c => c.peer === conn.peer)) {
            debug('Дубликат data соединения: ' + conn.peer);
            return;
        }
        
        dataConnections.push(conn);
        updatePeersUI();
        
        const peerShort = conn.peer.substring(0, 8);
        addMessage(`🔗 Участник ${peerShort}... подключился`, 'system');
        debug('Data соединение установлено: ' + peerShort);
        
        conn.on('data', (data) => {
            if (data.type === 'text') {
                addMessage(data.text, 'friend', data.from || conn.peer);
                
                if (amIHost && isMegaRoom) {
                    dataConnections.forEach(c => {
                        if (c.peer !== conn.peer && c.open) {
                            c.send(data);
                        }
                    });
                }
            }
        });
        
        conn.on('close', () => {
            const peerShort = conn.peer.substring(0, 8);
            dataConnections = dataConnections.filter(c => c.peer !== conn.peer);
            
            // Удаляем соответствующий медиа-звонок
            const callToRemove = mediaCalls.find(c => c.peer === conn.peer);
            if (callToRemove) {
                try { callToRemove.close(); } catch(e) {}
                mediaCalls = mediaCalls.filter(c => c.peer !== conn.peer);
            }
            
            updatePeersUI();
            addMessage(`🔌 Участник ${peerShort}... отключился`, 'system');
            debug('Data соединение закрыто: ' + peerShort);
        });
        
        conn.on('error', (err) => {
            debug('Ошибка data: ' + err.message);
        });
    }

    // ============ Media Call ============
    function setupMediaCall(call) {
        if (mediaCalls.find(c => c.peer === call.peer)) {
            debug('Дубликат media звонка: ' + call.peer);
            // Закрываем старый
            const old = mediaCalls.find(c => c.peer === call.peer);
            try { old.close(); } catch(e) {}
            mediaCalls = mediaCalls.filter(c => c.peer !== call.peer);
        }
        
        mediaCalls.push(call);
        updatePeersUI();
        
        const audioElem = document.createElement('audio');
        audioElem.id = 'audio-' + call.peer.substring(0, 8);
        audioElem.autoplay = true;
        audioElem.playsinline = true;
        audioElem.controls = false;
        audioContainers.appendChild(audioElem);
        
        const peerShort = call.peer.substring(0, 8);
        debug('Media звонок установлен: ' + peerShort);
        
        call.on('stream', (remoteStream) => {
            debug('Поток получен от: ' + peerShort);
            audioElem.srcObject = remoteStream;
            
            // Принудительно запускаем воспроизведение
            const playPromise = audioElem.play();
            if (playPromise) {
                playPromise.then(() => {
                    debug('Аудио играет от: ' + peerShort);
                    addMessage(`🔊 Звук от ${peerShort}... работает`, 'system');
                }).catch(e => {
                    debug('Ожидание клика для звука от: ' + peerShort);
                    addMessage(`👆 Коснитесь экрана для включения звука`, 'system');
                });
            }
        });
        
        call.on('close', () => {
            mediaCalls = mediaCalls.filter(c => c.peer !== call.peer);
            audioElem.remove();
            updatePeersUI();
            debug('Media звонок закрыт: ' + peerShort);
        });
        
        call.on('error', (err) => {
            debug('Ошибка media: ' + err.message);
        });
    }

    // ============ Звонок пиру ============
    function callPeer(peerId) {
        if (!localAudioStream) {
            debug('Нет микрофона для звонка к: ' + peerId);
            return null;
        }
        
        if (!peer || !peer.id) {
            debug('Peer не готов для звонка');
            return null;
        }
        
        // Закрываем старый звонок если есть
        const oldCall = mediaCalls.find(c => c.peer === peerId);
        if (oldCall) {
            try { oldCall.close(); } catch(e) {}
            mediaCalls = mediaCalls.filter(c => c.peer !== peerId);
        }
        
        debug('Звоним: ' + peerId.substring(0, 8));
        const call = peer.call(peerId, localAudioStream);
        setupMediaCall(call);
        return call;
    }

    // ============ Переподключение всего звука ============
    function refreshAllAudio() {
        debug('Переподключение звука...');
        
        // Закрываем все текущие звонки
        mediaCalls.forEach(call => {
            try { call.close(); } catch(e) {}
        });
        mediaCalls = [];
        
        // Очищаем аудио элементы
        audioContainers.innerHTML = '';
        
        // Если хост — звоним всем гостям
        if (amIHost) {
            dataConnections.forEach(conn => {
                setTimeout(() => {
                    callPeer(conn.peer);
                }, 300);
            });
            addMessage('🔄 Хост переподключает звук всем участникам...', 'system');
        } 
        // Если гость — звоним хосту
        else if (hostPeerId) {
            setTimeout(() => {
                const call = callPeer(hostPeerId);
                if (call) {
                    addMessage('🔄 Переподключение звука к хосту...', 'system');
                }
            }, 300);
        }
        
        updatePeersUI();
    }

    refreshAudioBtn.onclick = refreshAllAudio;

    // ============ PeerJS инициализация ============
    function initPeer(myId, hostId = null) {
        if (peer) {
            peer.destroy();
        }
        
        debug('Инициализация PeerJS: ' + myId.substring(0, 16));
        
        peer = new Peer(myId, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    // Добавляем TURN сервер для сложных NAT
                    {
                        urls: 'turn:openrelay.metered.ca:80',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    },
                    {
                        urls: 'turn:openrelay.metered.ca:443',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    }
                ],
                iceCandidatePoolSize: 2
            }
        });
        
        peer.on('open', async (id) => {
            myPeerId = id;
            myAvatar = getAvatar(id);
            statusDisplay.innerText = '🟢 Онлайн';
            debug('Peer открыт: ' + id.substring(0, 16));
            updatePeersUI();
            
            await getMicrophone();
            
            // Если гость — подключаемся к хосту
            if (!amIHost && hostId) {
                hostPeerId = hostId;
                statusDisplay.innerText = '🔗 Подключение к хосту...';
                debug('Подключаюсь к хосту: ' + hostId.substring(0, 16));
                
                // Data connection
                const conn = peer.connect(hostId, {
                    reliable: true
                });
                setupDataConnection(conn);
                
                // Media call — гость звонит хосту
                if (localAudioStream) {
                    setTimeout(() => {
                        debug('Гость звонит хосту');
                        const call = peer.call(hostId, localAudioStream);
                        setupMediaCall(call);
                    }, 1000);
                }
            }
        });
        
        // Входящие соединения (для хоста)
        peer.on('connection', (conn) => {
            debug('Входящее соединение: ' + conn.peer.substring(0, 16));
            setupDataConnection(conn);
            
            // Хост НЕ звонит сразу — ждём звонка от гостя
            // Но если через 2 секунды звонка нет — хост звонит сам
            if (amIHost) {
                setTimeout(() => {
                    const hasCall = mediaCalls.some(c => c.peer === conn.peer);
                    if (!hasCall && localAudioStream) {
                        debug('Хост звонит гостю (не дождался звонка): ' + conn.peer.substring(0, 16));
                        callPeer(conn.peer);
                    }
                }, 2000);
            }
        });
        
        // Входящие звонки (для хоста И гостя)
        peer.on('call', (call) => {
            debug('Входящий звонок от: ' + call.peer.substring(0, 16));
            
            if (localAudioStream) {
                call.answer(localAudioStream);
            } else {
                call.answer();
            }
            setupMediaCall(call);
        });
        
        // Ошибки
        peer.on('error', (err) => {
            console.error('PeerJS error:', err);
            debug('Ошибка PeerJS: ' + err.type + ' - ' + (err.message || ''));
            
            if (err.type === 'peer-unavailable') {
                statusDisplay.innerText = '❌ Комната не найдена';
                addMessage('⚠️ Хост не в сети. Проверьте название комнаты.', 'system');
            } else if (err.type === 'disconnected') {
                statusDisplay.innerText = '🔴 Соединение потеряно';
                addMessage('🔴 Соединение с сервером потеряно. Перезайдите.', 'system');
            } else {
                statusDisplay.innerText = '❌ Ошибка: ' + err.type;
            }
        });
        
        peer.on('disconnected', () => {
            statusDisplay.innerText = '🔴 Отключён от сервера';
            addMessage('🔴 Отключён от сигнального сервера. Нажмите "Покинуть комнату" и зайдите заново.', 'system');
            debug('Отключён от сигнального сервера');
        });
    }

    // ============ Старт сессии ============
    async function startSession(role, megaMode) {
        const roomName = roomInput.value.trim();
        if (!roomName) {
            alert('Введите название комнаты!');
            return;
        }
        
        isMegaRoom = megaMode;
        amIHost = (role === 'host');
        hostPeerId = null;
        
        loginOverlay.style.display = 'none';
        roomDisplay.innerText = roomName + (isMegaRoom ? ' 🔥MEGA' : '');
        statusDisplay.innerText = '⏳ Инициализация...';
        
        chatWindow.innerHTML = '';
        addMessage('⏳ Подготовка комнаты...', 'system');
        
        const randomId = Math.random().toString(36).substring(2, 6);
        let myId = '';
        let targetHostId = null;
        
        if (amIHost) {
            myId = await hashRoomName(roomName, 'host');
            statusDisplay.innerText = '🏠 Создаю комнату...';
            debug('Создание комнаты. ID хоста: ' + myId.substring(0, 16));
        } else {
            targetHostId = await hashRoomName(roomName, 'host');
            hostPeerId = targetHostId;
            myId = (await hashRoomName(roomName, 'guest')) + '_' + randomId;
            statusDisplay.innerText = '🔍 Ищу комнату...';
            debug('Поиск комнаты. ID хоста: ' + targetHostId.substring(0, 16));
        }
        
        initPeer(myId, targetHostId);
    }

    // ============ Выход из комнаты ============
    function leaveRoom() {
        debug('Выход из комнаты...');
        
        mediaCalls.forEach(call => {
            try { call.close(); } catch(e) {}
        });
        mediaCalls = [];
        
        dataConnections.forEach(conn => {
            try { conn.close(); } catch(e) {}
        });
        dataConnections = [];
        
        if (peer) {
            peer.destroy();
            peer = null;
        }
        
        audioContainers.innerHTML = '';
        localAudioStream = null;
        hostPeerId = null;
        
        updatePeersUI();
        chatWindow.innerHTML = '<div class="msg system">💬 Вы вышли из комнаты</div>';
        
        loginOverlay.style.display = 'flex';
        roomDisplay.innerText = '---';
        statusDisplay.innerText = 'Ожидание...';
        debugInfo.innerText = '';
    }

    // ============ Громкость ============
    myVolSlider.addEventListener('input', (e) => {
        const val = e.target.value;
        myVolTxt.innerText = val + '%';
        if (gainNode) {
            gainNode.gain.value = val / 100;
        }
    });

    // ============ Кнопки ============
    createRoomBtn.addEventListener('click', () => startSession('host', false));
    createMegaBtn.addEventListener('click', () => startSession('host', true));
    joinRoomBtn.addEventListener('click', () => startSession('guest', false));
    leaveBtn.addEventListener('click', leaveRoom);
    
    roomInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            startSession('guest', false);
        }
    });

    // ============ Глобальная разблокировка звука ============
    document.addEventListener('click', () => {
        ensureAudio();
        const audios = audioContainers.querySelectorAll('audio');
        audios.forEach(a => {
            if (a.paused && a.srcObject) {
                a.play().catch(() => {});
            }
        });
    });
    
    // Авто-клик для мобильных (разблокировка контекста)
    document.addEventListener('touchstart', () => {
        ensureAudio();
    }, { once: true });
</script>

</body>
</html>
