<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P2P Мега-Комнаты</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background-color: #1a0000; 
            color: #ffffff; 
            display: flex; 
            height: 100dvh; 
            margin: 0; 
            overflow: hidden; 
        }
        #sidebar { 
            width: 300px; 
            background-color: #2d0000; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            border-right: 2px solid #cc0000; 
            flex-shrink: 0; 
            overflow-y: auto; 
            gap: 8px;
        }
        #main-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #0d0000; 
            height: 100%; 
            position: relative;
        }
        #chat-window { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        #input-area { 
            padding: 15px; 
            background-color: #2d0000; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            border-top: 2px solid #cc0000;
        }
        .msg { 
            padding: 10px 14px; 
            border-radius: 8px; 
            max-width: 75%; 
            word-break: break-word; 
            font-size: 0.95em; 
            display: flex;
            align-items: flex-start;
            gap: 8px;
            position: relative;
        }
        .msg.me { 
            background-color: #cc0000; 
            color: #ffffff; 
            align-self: flex-end; 
            flex-direction: row-reverse;
            border: 1px solid #ff3333;
        }
        .msg.friend { 
            background-color: #4a0000; 
            color: #ffffff; 
            align-self: flex-start; 
            border: 1px solid #660000;
        }
        .msg.system {
            align-self: center;
            background: none;
            color: #ff9999;
            text-align: center;
            font-size: 0.8em;
            justify-content: center;
        }
        .msg.error {
            align-self: center;
            background: #ff0000;
            color: #ffffff;
            text-align: center;
            font-size: 0.8em;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ff4444;
        }
        .msg .read-check {
            font-size: 0.65em;
            opacity: 0.6;
            margin-left: 4px;
        }
        .msg .read-check.double {
            opacity: 1;
            color: #44ff44;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #660000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            border: 2px solid #cc0000;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .msg.me .avatar {
            background: #ff0000;
            border: 2px solid #ff6666;
        }
        .avatar.speaking {
            border-color: #00ff00 !important;
            box-shadow: 0 0 12px #00ff00;
            animation: speakGlow 0.5s ease-in-out infinite alternate;
        }
        @keyframes speakGlow {
            from { box-shadow: 0 0 8px #00ff00; }
            to { box-shadow: 0 0 16px #00ff00, 0 0 24px #00ff00; }
        }
        .msg-content {
            flex: 1;
            min-width: 0;
        }
        .msg-time {
            font-size: 0.7em;
            opacity: 0.7;
            margin-top: 2px;
            color: #ffcccc;
        }
        #screen-share-container {
            display: none;
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
            max-height: 50%;
            border: 2px solid #cc0000;
        }
        #screen-share-container.active {
            display: block;
        }
        #screen-share-container video {
            width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            transition: filter 0.3s;
        }
        #screen-share-container.blurred video {
            filter: blur(20px);
        }
        #screen-share-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(204,0,0,0.9);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            z-index: 10;
            border: 1px solid #ff3333;
        }
        #stop-screen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ffffff;
            color: #cc0000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 10;
        }
        #blur-screen-btn {
            position: absolute;
            top: 10px;
            right: 110px;
            background: #ffff00;
            color: #000000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 10;
        }
        #blur-screen-btn:hover {
            background: #ffff88;
        }
        #stop-screen-btn:hover {
            background: #ffcccc;
        }
        .room-box { 
            font-size: 1em; 
            background: #0d0000; 
            padding: 10px; 
            border-radius: 6px; 
            text-align: center; 
            font-weight: bold; 
            color: #ff6666; 
            border: 1px solid #cc0000; 
            word-break: break-all;
        }
        input[type="text"] { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #cc0000; 
            border-radius: 6px; 
            background-color: #1a0000; 
            color: #ffffff; 
            font-size: 1em; 
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #ff3333;
            box-shadow: 0 0 5px rgba(204,0,0,0.5);
        }
        input[type="text"]::placeholder {
            color: #996666;
        }
        button { 
            background-color: #cc0000; 
            color: #ffffff; 
            border: 1px solid #ff3333; 
            padding: 8px 10px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85em; 
            transition: 0.2s;
            white-space: nowrap;
        }
        button:hover {
            background-color: #ff0000;
            border-color: #ff6666;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled { 
            background-color: #4a0000; 
            color: #996666; 
            cursor: not-allowed; 
            transform: none;
            border-color: #660000;
        }
        .btn-mute-mic {
            background-color: #660000;
            border-color: #990000;
            width: 100%;
        }
        .btn-mute-mic.active {
            background-color: #ff0000;
            animation: pulse 1.5s infinite;
            border-color: #ff4444;
        }
        .btn-mute-audio {
            background-color: #660000;
            border-color: #990000;
            width: 100%;
        }
        .btn-mute-audio.active {
            background-color: #ff0000;
            border-color: #ff4444;
        }
        .btn-screen {
            background-color: #990000;
            border-color: #cc0000;
            width: 100%;
        }
        .btn-screen.active {
            background-color: #ff0000;
            animation: pulse 1.5s infinite;
            border-color: #ff6666;
        }
        .btn-camera {
            background-color: #990000;
            border-color: #cc0000;
            width: 100%;
        }
        .btn-camera.active {
            background-color: #ff0000;
            animation: pulse 1.5s infinite;
            border-color: #ff6666;
        }
        .btn-switch-camera {
            background-color: #660000;
            border-color: #990000;
            width: 100%;
            font-size: 0.75em;
            padding: 6px;
            display: none;
        }
        .btn-switch-camera.visible {
            display: block;
        }
        .btn-dm {
            background-color: #f9e2af;
            color: #11111b;
            border-color: #fab387;
            width: 100%;
        }
        .btn-dm:hover {
            background-color: #ffe0a0;
            color: #11111b;
        }
        .btn-ban {
            background-color: #660000;
            color: #ff9999;
            border-color: #990000;
            width: 100%;
            font-size: 0.75em;
            padding: 4px 8px;
        }
        .btn-ban:hover {
            background-color: #990000;
            color: #ffffff;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
            50% { opacity: 0.8; box-shadow: 0 0 20px rgba(255,0,0,0.8); }
        }
        .volume-control { 
            margin: 5px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            background: #0d0000; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #4a0000;
        }
        .volume-control label { 
            font-size: 0.8em; 
            color: #ff9999; 
            display: flex; 
            justify-content: space-between; 
        }
        .volume-control input[type="range"] { 
            width: 100%; 
            accent-color: #cc0000; 
            cursor: pointer; 
        }
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #0d0000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
        }
        .login-card { 
            background: #2d0000; 
            padding: 30px; 
            border-radius: 12px; 
            border: 2px solid #cc0000; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 0 30px rgba(204,0,0,0.3);
        }
        .login-card h2 {
            color: #ff3333;
            margin-bottom: 5px;
        }
        .btn-mega { 
            background-color: #ff0000; 
            border-color: #ff4444;
        }
        .btn-mega:hover {
            background-color: #ff3333;
        }
        .btn-join {
            background-color: #cc0000;
            border-color: #ff3333;
        }
        .btn-join:hover {
            background-color: #ff0000;
        }
        .btn-leave {
            background-color: #990000;
            border-color: #cc0000;
            margin-top: auto;
        }
        .btn-leave:hover {
            background-color: #cc0000;
        }
        .btn-refresh {
            background-color: #660000;
            border-color: #990000;
            font-size: 0.75em;
            padding: 6px 10px;
        }
        .btn-refresh:hover {
            background-color: #990000;
        }
        .btn-clear-history {
            background-color: #4a0000;
            border-color: #660000;
            font-size: 0.7em;
            padding: 5px 8px;
            margin-top: 3px;
        }
        .btn-clear-history:hover {
            background-color: #660000;
        }
        #audio-containers { 
            display: none; 
        }
        .peers-box {
            background: #0d0000;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8em;
            border: 1px solid #4a0000;
        }
        .peer-item {
            padding: 2px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .peer-item:hover {
            background: #3a0000;
            border-radius: 4px;
            padding: 2px 4px;
        }
        .peer-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff0000;
            flex-shrink: 0;
            box-shadow: 0 0 5px rgba(255,0,0,0.5);
        }
        .debug-info {
            font-size: 0.6em;
            color: #996666;
            word-break: break-all;
            margin-top: 3px;
            max-height: 80px;
            overflow-y: auto;
        }
        .history-info {
            font-size: 0.65em;
            color: #ff9999;
            margin-top: 3px;
        }
        /* DM Overlay */
        #dm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            z-index: 9998;
        }
        #dm-overlay.active {
            display: flex;
            flex-direction: column;
        }
        #dm-header {
            background: #2d0000;
            padding: 15px;
            border-bottom: 2px solid #cc0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #dm-chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #dm-input-area {
            padding: 15px;
            background: #2d0000;
            display: flex;
            gap: 10px;
            border-top: 2px solid #cc0000;
        }
        /* Мобильная адаптация */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            #sidebar {
                width: 100%;
                max-height: 40%;
                flex-shrink: 0;
                padding: 8px;
                gap: 4px;
                overflow-y: auto;
            }
            #main-area {
                flex: 1;
                min-height: 0;
            }
            #chat-window {
                flex: 1;
                padding: 10px;
            }
            #input-area {
                padding: 10px;
            }
            .room-box {
                font-size: 0.8em;
                padding: 6px;
            }
            button {
                padding: 8px;
                font-size: 0.8em;
            }
            #screen-share-container {
                max-height: 30%;
            }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>🎙️ P2P Лобби</h2>
        <p style="color: #ff9999; font-size: 0.9em;">Введите название комнаты</p>
        <input type="text" id="room-input" placeholder="Название комнаты..." style="text-align: center;">
        
        <button id="create-room-btn">Создать комнату (1 на 1)</button>
        <button id="create-mega-btn" class="btn-mega">🔥 Создать МЕГА-комнату</button>
        <button id="join-room-btn" class="btn-join">🚪 Войти в комнату</button>
        
        <p style="font-size:0.65em;color:#996666;margin-top:6px;">
            💡 Создавайте на ПК, заходите с телефона
        </p>
        <p style="font-size:0.65em;color:#996666;">
            📱 Демка экрана — ПК. Телефон — камера
        </p>
    </div>
</div>

<!-- DM Overlay -->
<div id="dm-overlay">
    <div id="dm-header">
        <span style="color:#ff6666;font-weight:bold" id="dm-title">💬 Личные сообщения</span>
        <button id="dm-close-btn" style="background:#990000;border-color:#cc0000">✕ Закрыть</button>
    </div>
    <div id="dm-chat"></div>
    <div id="dm-input-area">
        <input type="text" id="dm-msg-input" placeholder="Личное сообщение...">
        <button id="dm-send-btn">📨</button>
    </div>
</div>

<div id="sidebar">
    <h3 style="margin: 0; font-size: 0.85em; color: #ff9999;">🏠 Комната:</h3>
    <div class="room-box" id="room-display">---</div>
    
    <div id="status" style="color: #ff3333; font-weight: bold; font-size: 0.8em; word-break: break-all;">
        Ожидание...
    </div>
    
    <div class="peers-box">
        <div id="peers-count" style="font-weight: bold; margin-bottom: 3px; color: #ffffff;">👥 Участников: 1</div>
        <div id="peers-list"></div>
    </div>

    <div class="volume-control">
        <label>🎤 Микрофон: <span id="my-vol-txt">100%</span></label>
        <input type="range" id="my-volume" min="0" max="200" value="100">
    </div>

    <button id="mute-mic-btn" class="btn-mute-mic">🎤 Микрофон вкл</button>
    <button id="mute-audio-btn" class="btn-mute-audio">🔊 Звук вкл</button>
    <button id="screen-share-btn" class="btn-screen">🖥️ Демка экрана (ПК)</button>
    <button id="camera-btn" class="btn-camera">📱 Включить камеру</button>
    <button id="switch-camera-btn" class="btn-switch-camera">🔄 Переключить камеру</button>
    <button id="refresh-audio-btn" class="btn-refresh">🔄 Переподключить звук</button>
    <button id="clear-history-btn" class="btn-clear-history">🗑️ Очистить историю</button>
    <button id="leave-btn" class="btn-leave">🚪 Покинуть комнату</button>
    
    <div class="history-info" id="history-info"></div>
    <div class="debug-info" id="debug-info"></div>
</div>

<div id="main-area">
    <div id="screen-share-container">
        <div id="screen-share-label">📺 Трансляция</div>
        <button id="blur-screen-btn">🔍 Блюр</button>
        <button id="stop-screen-btn">❌ Остановить</button>
        <video id="screen-video" autoplay playsinline muted></video>
    </div>
    <div id="chat-window">
        <div class="msg system">
            <span>💬 Чат готов. Все функции активны.</span>
        </div>
    </div>
    
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Введите сообщение...">
        <button id="send-btn">📨</button>
    </div>
</div>

<div id="audio-containers"></div>
