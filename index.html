<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P2P Мега-Комнаты</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background-color: #1e1e2e; 
            color: #cdd6f4; 
            display: flex; 
            height: 100dvh; 
            margin: 0; 
            overflow: hidden; 
        }
        #sidebar { 
            width: 300px; 
            background-color: #252538; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            border-right: 2px solid #313244; 
            flex-shrink: 0; 
            overflow-y: auto; 
            gap: 10px;
        }
        #main-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: #181825; 
            height: 100%; 
            position: relative;
        }
        #chat-window { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        #input-area { 
            padding: 15px; 
            background-color: #313244; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
        .msg { 
            padding: 10px 14px; 
            border-radius: 8px; 
            max-width: 75%; 
            word-break: break-word; 
            font-size: 0.95em; 
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .msg.me { 
            background-color: #89b4fa; 
            color: #11111b; 
            align-self: flex-end; 
            flex-direction: row-reverse;
        }
        .msg.friend { 
            background-color: #45475a; 
            color: #cdd6f4; 
            align-self: flex-start; 
        }
        .msg.system {
            align-self: center;
            background: none;
            color: #6c7086;
            text-align: center;
            font-size: 0.8em;
            justify-content: center;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #585b70;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }
        .msg.me .avatar {
            background: #1e66f5;
        }
        .msg-content {
            flex: 1;
            min-width: 0;
        }
        .msg-time {
            font-size: 0.7em;
            opacity: 0.6;
            margin-top: 2px;
        }
        #screen-share-container {
            display: none;
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
            max-height: 50%;
        }
        #screen-share-container.active {
            display: block;
        }
        #screen-share-container video {
            width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }
        #screen-share-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            z-index: 10;
        }
        #stop-screen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f38ba8;
            color: #11111b;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 10;
        }
        .room-box { 
            font-size: 1.1em; 
            background: #11111b; 
            padding: 12px; 
            border-radius: 6px; 
            text-align: center; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #f9e2af; 
            border: 1px solid #313244; 
            word-break: break-all;
        }
        input[type="text"] { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            background-color: #45475a; 
            color: #fff; 
            font-size: 1em; 
            outline: none;
        }
        button { 
            background-color: #a6e3a1; 
            color: #11111b; 
            border: none; 
            padding: 10px 12px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.9em; 
            transition: 0.2s;
            white-space: nowrap;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled { 
            background-color: #585b70; 
            color: #7f849c; 
            cursor: not-allowed; 
            transform: none;
        }
        .btn-screen {
            background-color: #cba6f7;
            width: 100%;
        }
        .btn-screen.active {
            background-color: #f38ba8;
            animation: pulse 1.5s infinite;
        }
        .btn-camera {
            background-color: #94e2d5;
            width: 100%;
        }
        .btn-camera.active {
            background-color: #f38ba8;
            animation: pulse 1.5s infinite;
        }
        .btn-switch-camera {
            background-color: #89dceb;
            width: 100%;
            font-size: 0.8em;
            padding: 8px;
            display: none;
        }
        .btn-switch-camera.visible {
            display: block;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .volume-control { 
            margin: 5px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            background: #181825; 
            padding: 10px; 
            border-radius: 6px; 
        }
        .volume-control label { 
            font-size: 0.8em; 
            color: #a6adc8; 
            display: flex; 
            justify-content: space-between; 
        }
        .volume-control input[type="range"] { 
            width: 100%; 
            accent-color: #a6e3a1; 
            cursor: pointer; 
        }
        #login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #11111b; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
        }
        .login-card { 
            background: #252538; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #313244; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .login-card h2 {
            color: #89b4fa;
            margin-bottom: 5px;
        }
        .btn-mega { 
            background-color: #f38ba8; 
        }
        .btn-join {
            background-color: #89b4fa;
        }
        .btn-leave {
            background-color: #eba0ac;
            margin-top: auto;
        }
        .btn-refresh {
            background-color: #fab387;
            font-size: 0.8em;
            padding: 8px 12px;
        }
        #audio-containers { 
            display: none; 
        }
        .peers-box {
            background: #11111b;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8em;
        }
        .peer-item {
            padding: 3px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85em;
        }
        .peer-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a6e3a1;
            flex-shrink: 0;
        }
        .debug-info {
            font-size: 0.65em;
            color: #585b70;
            word-break: break-all;
            margin-top: 5px;
        }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; max-height: 42%; flex-shrink: 0; padding: 10px; gap: 6px; overflow-y: auto; }
            #main-area { flex: 1; min-height: 0; }
            #chat-window { flex: 1; padding: 10px; }
            #input-area { padding: 10px; }
            .room-box { font-size: 0.9em; padding: 8px; }
            button { padding: 10px; font-size: 0.85em; }
            #screen-share-container { max-height: 30%; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>🎙️ P2P Лобби</h2>
        <p style="color: #a6adc8; font-size: 0.9em;">Введите название комнаты</p>
        <input type="text" id="room-input" placeholder="Название комнаты..." style="text-align: center;">
        
        <button id="create-room-btn">Создать комнату (1 на 1)</button>
        <button id="create-mega-btn" class="btn-mega">🔥 Создать МЕГА-комнату</button>
        <button id="join-room-btn" class="btn-join">🚪 Войти в комнату</button>
        
        <p style="font-size:0.7em;color:#585b70;margin-top:8px;">
            💡 Создавайте на ПК, заходите с телефона
        </p>
    </div>
</div>

<div id="sidebar">
    <h3 style="margin: 0; font-size: 0.9em; color: #a6adc8;">🏠 Комната:</h3>
    <div class="room-box" id="room-display">---</div>
    
    <div id="status" style="color: #a6e3a1; font-weight: bold; font-size: 0.85em; word-break: break-all;">
        Ожидание...
    </div>
    
    <div class="peers-box">
        <div id="peers-count" style="font-weight: bold; margin-bottom: 4px;">👥 Участников: 1</div>
        <div id="peers-list"></div>
    </div>

    <div class="volume-control">
        <label>🎤 Микрофон: <span id="my-vol-txt">100%</span></label>
        <input type="range" id="my-volume" min="0" max="200" value="100">
    </div>

    <button id="screen-share-btn" class="btn-screen">🖥️ Демка экрана</button>
    <button id="camera-btn" class="btn-camera">📱 Включить камеру</button>
    <button id="switch-camera-btn" class="btn-switch-camera">🔄 Переключить камеру</button>
    <button id="refresh-audio-btn" class="btn-refresh">🔄 Переподключить звук</button>
    <button id="leave-btn" class="btn-leave">🚪 Покинуть комнату</button>
    
    <div class="debug-info" id="debug-info"></div>
</div>

<div id="main-area">
    <div id="screen-share-container">
        <div id="screen-share-label">📺 Трансляция</div>
        <button id="stop-screen-btn">❌ Остановить</button>
        <video id="screen-video" autoplay playsinline muted></video>
    </div>
    <div id="chat-window">
        <div class="msg system">
            <span>💬 Чат готов. Демка экрана и камера работают на ПК и телефоне!</span>
        </div>
    </div>
    
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Введите сообщение...">
        <button id="send-btn">📨</button>
    </div>
</div>

<div id="audio-containers"></div>

<script>
    // ============ Утилиты ============
    const avatars = ['🐱','🐶','🦊','🐸','🐵','🐼','🐨','🐯','🦁','🐮','🐷','🐰','🐻','🐔','🐧','🦄'];
    
    function getAvatar(seed) {
        let hash = 0;
        for (let i = 0; i < seed.length; i++) {
            hash = ((hash << 5) - hash) + seed.charCodeAt(i);
            hash |= 0;
        }
        return avatars[Math.abs(hash) % avatars.length];
    }

    function getTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2,'0') + ':' + 
               now.getMinutes().toString().padStart(2,'0');
    }

    async function hashRoomName(name, prefix) {
        const clean = name.trim().toLowerCase();
        const msgBuffer = new TextEncoder().encode(clean);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('').substring(0,16);
        return `rm_${prefix}_${hashHex}`;
    }

    function isMobile() {
        return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    }

    // ============ DOM ============
    const loginOverlay = document.getElementById('login-overlay');
    const roomInput = document.getElementById('room-input');
    const roomDisplay = document.getElementById('room-display');
    const statusDisplay = document.getElementById('status');
    const peersCount = document.getElementById('peers-count');
    const peersList = document.getElementById('peers-list');
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const audioContainers = document.getElementById('audio-containers');
    const myVolSlider = document.getElementById('my-volume');
    const myVolTxt = document.getElementById('my-vol-txt');
    const debugInfo = document.getElementById('debug-info');
    const screenShareBtn = document.getElementById('screen-share-btn');
    const cameraBtn = document.getElementById('camera-btn');
    const switchCameraBtn = document.getElementById('switch-camera-btn');
    const screenShareContainer = document.getElementById('screen-share-container');
    const screenVideo = document.getElementById('screen-video');
    const stopScreenBtn = document.getElementById('stop-screen-btn');
    const screenShareLabel = document.getElementById('screen-share-label');
    const refreshAudioBtn = document.getElementById('refresh-audio-btn');
    const leaveBtn = document.getElementById('leave-btn');

    // ============ Состояние ============
    let peer = null;
    let localAudioStream = null;
    let localScreenStream = null;
    let localCameraStream = null;
    let audioContext = null;
    let gainNode = null;
    let dataConnections = [];
    let mediaCalls = [];
    let videoCalls = [];
    let isMegaRoom = false;
    let amIHost = false;
    let myPeerId = '';
    let myAvatar = '';
    let hostPeerId = null;
    let isSharingScreen = false;
    let isSharingCamera = false;
    let currentCameraFacing = 'user'; // 'user' = фронталка, 'environment' = задняя

    // ============ Аудио ============
    function ensureAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') audioContext.resume();
    }
    document.addEventListener('click', ensureAudio);
    document.addEventListener('touchstart', ensureAudio);

    async function getMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, 
                video: false 
            });
            ensureAudio();
            const source = audioContext.createMediaStreamSource(stream);
            gainNode = audioContext.createGain();
            source.connect(gainNode);
            const dest = audioContext.createMediaStreamDestination();
            gainNode.connect(dest);
            localAudioStream = dest.stream;
            statusDisplay.innerText = '🎤 Микрофон готов';
            debug('Микрофон получен');
            return true;
        } catch (err) {
            console.warn('Микрофон не доступен:', err);
            statusDisplay.innerText = '⚠️ Без микрофона';
            debug('Ошибка микрофона: ' + err.message);
            return false;
        }
    }

    function debug(msg) {
        console.log('[DEBUG]', msg);
        debugInfo.innerText = msg;
    }

    // ============ Камера с переключением ============
    async function startCameraShare(facingMode = 'user') {
        try {
            // Останавливаем предыдущую камеру
            if (localCameraStream) {
                localCameraStream.getTracks().forEach(t => t.stop());
                localCameraStream = null;
            }
            if (isSharingScreen) stopScreenShare();
            
            const constraints = {
                video: {
                    facingMode: facingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };
            
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            localCameraStream = stream;
            currentCameraFacing = facingMode;
            
            screenVideo.srcObject = stream;
            screenShareContainer.classList.add('active');
            screenShareLabel.innerText = facingMode === 'user' ? '📱 Фронтальная камера' : '📱 Основная камера';
            cameraBtn.classList.add('active');
            cameraBtn.innerText = '📱 Камера работает... (стоп)';
            switchCameraBtn.classList.add('visible');
            isSharingCamera = true;
            
            // Закрываем старые видео-звонки и шлём новый стрим
            closeAllVideoCalls();
            broadcastVideo(stream, 'camera');
            
            stream.getVideoTracks()[0].addEventListener('ended', () => stopCameraShare());
            
            addMessage(`📱 Камера включена (${facingMode === 'user' ? 'фронтальная' : 'основная'})`, 'system');
            debug('Камера запущена: ' + facingMode);
            
        } catch (err) {
            console.error('Ошибка камеры:', err);
            debug('Ошибка камеры: ' + err.message);
            if (err.name === 'NotAllowedError') addMessage('⚠️ Доступ к камере запрещён.', 'system');
            else if (err.name === 'NotFoundError') addMessage('⚠️ Камера не найдена.', 'system');
            else addMessage('❌ Ошибка камеры: ' + err.message, 'system');
        }
    }

    function stopCameraShare() {
        if (localCameraStream) {
            localCameraStream.getTracks().forEach(t => t.stop());
            localCameraStream = null;
        }
        closeAllVideoCalls();
        screenVideo.srcObject = null;
        screenShareContainer.classList.remove('active');
        screenShareLabel.innerText = '📺 Трансляция';
        cameraBtn.classList.remove('active');
        cameraBtn.innerText = '📱 Включить камеру';
        switchCameraBtn.classList.remove('visible');
        isSharingCamera = false;
        addMessage('📱 Камера выключена', 'system');
        debug('Камера остановлена');
    }

    function switchCamera() {
        if (!isSharingCamera) return;
        const newFacing = currentCameraFacing === 'user' ? 'environment' : 'user';
        debug('Переключение камеры на: ' + newFacing);
        startCameraShare(newFacing);
    }

    // ============ Экран ============
    async function startScreenShare() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
                audio: true
            });
            if (isSharingCamera) stopCameraShare();
            
            localScreenStream = stream;
            screenVideo.srcObject = stream;
            screenShareContainer.classList.add('active');
            screenShareLabel.innerText = '🖥️ Демка экрана';
            screenShareBtn.classList.add('active');
            screenShareBtn.innerText = '🖥️ Идёт демка... (стоп)';
            isSharingScreen = true;
            
            closeAllVideoCalls();
            broadcastVideo(stream, 'screen');
            
            stream.getVideoTracks()[0].addEventListener('ended', () => stopScreenShare());
            addMessage('🖥️ Демка экрана запущена', 'system');
            debug('Экран шарится');
        } catch (err) {
            console.error('Ошибка экрана:', err);
            debug('Ошибка экрана: ' + err.message);
            if (isMobile()) addMessage('⚠️ Шеринг экрана не работает в этом браузере. Попробуйте камеру.', 'system');
            else addMessage('❌ Не удалось: ' + err.message, 'system');
        }
    }

    function stopScreenShare() {
        if (localScreenStream) {
            localScreenStream.getTracks().forEach(t => t.stop());
            localScreenStream = null;
        }
        closeAllVideoCalls();
        screenVideo.srcObject = null;
        screenShareContainer.classList.remove('active');
        screenShareLabel.innerText = '📺 Трансляция';
        screenShareBtn.classList.remove('active');
        screenShareBtn.innerText = '🖥️ Демка экрана';
        isSharingScreen = false;
        addMessage('🖥️ Демка остановлена', 'system');
        debug('Экран остановлен');
    }

    // ============ Видео-звонки ============
    function broadcastVideo(stream, type) {
        dataConnections.forEach(conn => {
            const exists = videoCalls.find(c => c.peer === conn.peer);
            if (!exists && peer) {
                const call = peer.call(conn.peer, stream);
                setupVideoCall(call, conn.peer, type);
            }
        });
    }

    function setupVideoCall(call, peerId, type) {
        videoCalls.push(call);
        debug(`Видео (${type}) с: ` + peerId.substring(0,8));
        call.on('close', () => {
            videoCalls = videoCalls.filter(c => c.peer !== peerId);
            updatePeersUI();
        });
        call.on('error', e => debug('Ошибка видео: ' + e.message));
    }

    function closeAllVideoCalls() {
        videoCalls.forEach(c => { try { c.close(); } catch(e) {} });
        videoCalls = [];
        updatePeersUI();
    }

    function receiveVideoStream(stream, peerId, type) {
        const peerShort = peerId.substring(0,8);
        const label = type === 'camera' ? '📱 Камера' : '🖥️ Экран';
        screenShareLabel.innerText = `${label} от ${peerShort}...`;
        screenVideo.srcObject = stream;
        screenShareContainer.classList.add('active');
        stream.getVideoTracks()[0].addEventListener('ended', () => {
            screenVideo.srcObject = null;
            screenShareContainer.classList.remove('active');
            screenShareLabel.innerText = '📺 Трансляция';
        });
        addMessage(`${label} от ${peerShort}...`, 'system');
    }

    // ============ UI ============
    function updatePeersUI() {
        peersCount.innerText = `👥 Участников: ${dataConnections.length + 1}`;
        let html = `<div class="peer-item"><span class="peer-dot"></span> Вы ${myAvatar}</div>`;
        dataConnections.forEach(conn => {
            const ps = conn.peer.substring(0,8);
            const hasAudio = mediaCalls.some(c => c.peer === conn.peer);
            const hasVideo = videoCalls.some(c => c.peer === conn.peer);
            html += `<div class="peer-item"><span class="peer-dot"></span> ${ps}... ${getAvatar(conn.peer)} ${hasAudio?'🔊':'🔇'}${hasVideo?' 📹':''}</div>`;
        });
        peersList.innerHTML = html;
    }

    function addMessage(text, type, peerId = '') {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (type === 'system') {
            div.innerHTML = `<span>${text}</span>`;
        } else {
            const ava = type === 'me' ? myAvatar : getAvatar(peerId);
            div.innerHTML = `<div class="avatar">${ava}</div><div class="msg-content"><div>${escapeHtml(text)}</div><div class="msg-time">${getTime()}</div></div>`;
        }
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    // ============ Сообщения ============
    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;
        const payload = { type: 'text', text, from: myPeerId, time: getTime() };
        dataConnections.forEach(c => { if (c.open) c.send(payload); });
        addMessage(text, 'me');
        msgInput.value = '';
        if (dataConnections.length === 0) addMessage('⚠️ Нет участников. Сообщение видно только вам.', 'system');
    }
    sendBtn.onclick = sendMessage;
    msgInput.onkeypress = e => { if (e.key === 'Enter') sendMessage(); };

    // ============ Data ============
    function setupDataConnection(conn) {
        if (dataConnections.find(c => c.peer === conn.peer)) return;
        dataConnections.push(conn);
        updatePeersUI();
        const ps = conn.peer.substring(0,8);
        addMessage(`🔗 ${ps}... подключился`, 'system');
        debug('Data: ' + ps);
        
        // Отправляем активные стримы новому
        if (isSharingScreen && localScreenStream && peer) {
            setTimeout(() => { const call = peer.call(conn.peer, localScreenStream); setupVideoCall(call, conn.peer, 'screen'); }, 500);
        }
        if (isSharingCamera && localCameraStream && peer) {
            setTimeout(() => { const call = peer.call(conn.peer, localCameraStream); setupVideoCall(call, conn.peer, 'camera'); }, 700);
        }
        
        conn.on('data', data => {
            if (data.type === 'text') {
                addMessage(data.text, 'friend', data.from || conn.peer);
                if (amIHost && isMegaRoom) {
                    dataConnections.forEach(c => { if (c.peer !== conn.peer && c.open) c.send(data); });
                }
            }
        });
        
        conn.on('close', () => {
            dataConnections = dataConnections.filter(c => c.peer !== conn.peer);
            [mediaCalls, videoCalls].forEach(arr => {
                const found = arr.find(c => c.peer === conn.peer);
                if (found) { try { found.close(); } catch(e) {} }
            });
            mediaCalls = mediaCalls.filter(c => c.peer !== conn.peer);
            videoCalls = videoCalls.filter(c => c.peer !== conn.peer);
            updatePeersUI();
            addMessage(`🔌 ${ps}... отключился`, 'system');
            if (screenVideo.srcObject && videoCalls.length === 0 && !isSharingScreen && !isSharingCamera) {
                screenVideo.srcObject = null;
                screenShareContainer.classList.remove('active');
                screenShareLabel.innerText = '📺 Трансляция';
            }
        });
        conn.on('error', e => debug('Data error: ' + e.message));
    }

    // ============ Аудио-звонки ============
    function setupMediaCall(call) {
        if (mediaCalls.find(c => c.peer === call.peer)) {
            try { mediaCalls.find(c => c.peer === call.peer).close(); } catch(e) {}
            mediaCalls = mediaCalls.filter(c => c.peer !== call.peer);
        }
        mediaCalls.push(call);
        updatePeersUI();
        
        const audio = document.createElement('audio');
        audio.autoplay = true;
        audio.playsinline = true;
        audioContainers.appendChild(audio);
        const ps = call.peer.substring(0,8);
        debug('Аудио-звонок: ' + ps);
        
        call.on('stream', stream => {
            audio.srcObject = stream;
            audio.play().catch(() => {});
            debug('Аудио-поток от: ' + ps);
        });
        call.on('close', () => {
            mediaCalls = mediaCalls.filter(c => c.peer !== call.peer);
            audio.remove();
            updatePeersUI();
        });
        call.on('error', e => debug('Аудио error: ' + e.message));
    }

    function callPeerAudio(peerId) {
        if (!localAudioStream || !peer) return;
        const old = mediaCalls.find(c => c.peer === peerId);
        if (old) { try { old.close(); } catch(e) {}; mediaCalls = mediaCalls.filter(c => c.peer !== peerId); }
        debug('Звоним аудио: ' + peerId.substring(0,8));
        const call = peer.call(peerId, localAudioStream);
        setupMediaCall(call);
    }

    function refreshAllAudio() {
        mediaCalls.forEach(c => { try { c.close(); } catch(e) {} });
        mediaCalls = [];
        audioContainers.innerHTML = '';
        
        if (amIHost) {
            dataConnections.forEach(conn => setTimeout(() => callPeerAudio(conn.peer), 300));
            addMessage('🔄 Хост переподключает звук...', 'system');
        } else if (hostPeerId) {
            setTimeout(() => callPeerAudio(hostPeerId), 300);
            addMessage('🔄 Переподключение звука...', 'system');
        }
        
        if (isSharingScreen && localScreenStream) { closeAllVideoCalls(); setTimeout(() => broadcastVideo(localScreenStream, 'screen'), 500); }
        if (isSharingCamera && localCameraStream) { closeAllVideoCalls(); setTimeout(() => broadcastVideo(localCameraStream, 'camera'), 700); }
        updatePeersUI();
    }

    // ============ PeerJS ============
    function initPeer(myId, hostId = null) {
        if (peer) peer.destroy();
        debug('Init Peer: ' + myId.substring(0,16));
        
        peer = new Peer(myId, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                ],
                iceCandidatePoolSize: 2
            }
        });
        
        peer.on('open', async id => {
            myPeerId = id;
            myAvatar = getAvatar(id);
            statusDisplay.innerText = '🟢 Онлайн';
            updatePeersUI();
            await getMicrophone();
            
            if (!amIHost && hostId) {
                hostPeerId = hostId;
                statusDisplay.innerText = '🔗 Подключение...';
                const conn = peer.connect(hostId, { reliable: true });
                setupDataConnection(conn);
                // Гость НЕ звонит хосту — хост сам позвонит
                debug('Гость ждёт звонка от хоста');
            }
        });
        
        peer.on('connection', conn => {
            debug('Входящее: ' + conn.peer.substring(0,16));
            setupDataConnection(conn);
            
            // Хост ВСЕГДА звонит гостю (решает проблему телефон->ПК)
            if (amIHost) {
                setTimeout(() => {
                    const hasAudioCall = mediaCalls.some(c => c.peer === conn.peer);
                    if (!hasAudioCall && localAudioStream) {
                        debug('Хост звонит гостю: ' + conn.peer.substring(0,16));
                        callPeerAudio(conn.peer);
                    }
                }, 1500);
            }
        });
        
        peer.on('call', call => {
            debug('Входящий звонок: ' + call.peer.substring(0,16));
            
            // Всегда отвечаем с аудио если есть
            if (localAudioStream) call.answer(localAudioStream);
            else call.answer();
            
            call.on('stream', remoteStream => {
                if (remoteStream.getVideoTracks().length > 0) {
                    // Видео (камера или экран)
                    const label = remoteStream.getVideoTracks()[0].label || '';
                    const videoType = (label.includes('camera') || label.includes('front') || label.includes('back')) ? 'camera' : 'screen';
                    receiveVideoStream(remoteStream, call.peer, videoType);
                    setupVideoCall(call, call.peer, videoType);
                } else {
                    // Аудио
                    setupMediaCall(call);
                }
            });
        });
        
        peer.on('error', err => {
            debug('Peer error: ' + err.type);
            if (err.type === 'peer-unavailable') { statusDisplay.innerText = '❌ Комната не найдена'; addMessage('⚠️ Хост не в сети.', 'system'); }
            else if (err.type === 'disconnected') { statusDisplay.innerText = '🔴 Соединение потеряно'; }
            else statusDisplay.innerText = '❌ ' + err.type;
        });
        
        peer.on('disconnected', () => {
            statusDisplay.innerText = '🔴 Отключён';
            addMessage('🔴 Сигнальный сервер недоступен. Перезайдите.', 'system');
        });
    }

    // ============ Старт / Выход ============
    async function startSession(role, mega) {
        const name = roomInput.value.trim();
        if (!name) return alert('Введите название комнаты!');
        isMegaRoom = mega;
        amIHost = (role === 'host');
        hostPeerId = null;
        loginOverlay.style.display = 'none';
        roomDisplay.innerText = name + (mega ? ' 🔥MEGA' : '');
        statusDisplay.innerText = '⏳ Инициализация...';
        chatWindow.innerHTML = '';
        addMessage('⏳ Подготовка...', 'system');
        
        const rnd = Math.random().toString(36).substring(2,6);
        let myId, targetHost = null;
        if (amIHost) {
            myId = await hashRoomName(name, 'host');
        } else {
            targetHost = await hashRoomName(name, 'host');
            hostPeerId = targetHost;
            myId = (await hashRoomName(name, 'guest')) + '_' + rnd;
        }
        initPeer(myId, targetHost);
    }

    function leaveRoom() {
        stopScreenShare();
        stopCameraShare();
        [mediaCalls, videoCalls].forEach(arr => arr.forEach(c => { try { c.close(); } catch(e) {} }));
        dataConnections.forEach(c => { try { c.close(); } catch(e) {} });
        mediaCalls = []; videoCalls = []; dataConnections = [];
        if (peer) { peer.destroy(); peer = null; }
        audioContainers.innerHTML = '';
        localAudioStream = localScreenStream = localCameraStream = null;
        hostPeerId = null; isSharingScreen = isSharingCamera = false;
        screenVideo.srcObject = null;
        screenShareContainer.classList.remove('active');
        screenShareLabel.innerText = '📺 Трансляция';
        screenShareBtn.classList.remove('active'); screenShareBtn.innerText = '🖥️ Демка экрана';
        cameraBtn.classList.remove('active'); cameraBtn.innerText = '📱 Включить камеру';
        switchCameraBtn.classList.remove('visible');
        updatePeersUI();
        chatWindow.innerHTML = '<div class="msg system">💬 Вы вышли</div>';
        loginOverlay.style.display = 'flex';
        roomDisplay.innerText = '---'; statusDisplay.innerText = 'Ожидание...'; debugInfo.innerText = '';
    }

    // ============ Обработчики ============
    myVolSlider.oninput = e => { myVolTxt.innerText = e.target.value + '%'; if (gainNode) gainNode.gain.value = e.target.value / 100; };
    screenShareBtn.onclick = () => isSharingScreen ? stopScreenShare() : startScreenShare();
    cameraBtn.onclick = () => isSharingCamera ? stopCameraShare() : startCameraShare('user');
    switchCameraBtn.onclick = switchCamera;
    stopScreenBtn.onclick = () => { if (isSharingScreen) stopScreenShare(); if (isSharingCamera) stopCameraShare(); };
    refreshAudioBtn.onclick = refreshAllAudio;
    leaveBtn.onclick = leaveRoom;
    document.getElementById('create-room-btn').onclick = () => startSession('host', false);
    document.getElementById('create-mega-btn').onclick = () => startSession('host', true);
    document.getElementById('join-room-btn').onclick = () => startSession('guest', false);
    roomInput.onkeypress = e => { if (e.key === 'Enter') startSession('guest', false); };

    document.addEventListener('click', () => {
        ensureAudio();
        audioContainers.querySelectorAll('audio').forEach(a => { if (a.paused && a.srcObject) a.play().catch(()=>{}); });
    });
    document.addEventListener('touchstart', ensureAudio, { once: true });
</script>
